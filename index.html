<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./public/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <title>kingdom-sweetz-n-treatz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://kit.fontawesome.com/8746c9e2b3.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify form detection — hidden from users, read by Netlify's build bot -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="contact_name" />
      <input name="contact_email" />
      <input name="contact_subject" />
      <textarea name="contact_message"></textarea>
    </form>

    <form name="quote" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="quote_name" />
      <input name="quote_email" />
      <input name="quote_phone" />
      <select name="quote_event"></select>
      <input name="quote_date" />
      <textarea name="quote_details"></textarea>
    </form>

    <form name="order" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="order_name" />
      <input name="order_email" />
      <input name="order_phone" />
      <select name="order_item"></select>
      <input name="order_flavor" />
      <input name="order_quantity" />
      <input name="order_date" />
      <textarea name="order_instructions"></textarea>
    </form>

    <form name="review" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="review_name" />
      <input name="review_email" />
      <select name="review_rating"></select>
      <textarea name="review_text"></textarea>
    </form>
  </body>
</html>
